<h2>Users</h2>

@if (users.length > 0) {

  @for (user of users; track user.id) {
    <div>
      <p><strong>ID:</strong> {{ user.id }}</p>
      <p><strong>Name:</strong> {{ user.name }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <hr />
    </div>
  }

} @else {
  <p>No users found</p>
}
